# Logrotate config for Claude Code security audit log
# Install: sudo ln -s ~/.claude/security/logrotate.conf /etc/logrotate.d/claude-security
# Or run manually: logrotate -f ~/.claude/security/logrotate.conf

/home/forgemaster/.claude/security/audit.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 600 forgemaster forgemaster
    dateext
    dateformat -%Y%m%d
}
