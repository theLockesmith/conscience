# Quality Enforcer Sensitivity Configuration
# Each category can be: block, warn, or disabled
#
# block    = Hard block (default) - response is rejected
# warn     = Warning only - logged but not blocked
# disabled = Skip entirely - no checking
#
# Format: CATEGORY_MODE=value
# Category names must match exactly (use underscores for spaces)

# Core anti-patterns
DEFERRAL_MODE=block
TODO_FIXME_CREATION_MODE=block
HEDGING_MODE=block
BYPASS_MODE=block

# Engineering principles
LIFECYCLE_MODE=block
DATA_OPERATIONS_MODE=block
VERIFICATION_MODE=block
OBSERVABILITY_MODE=block
BOUNDARIES_MODE=block
DETERMINISM_MODE=block
REVERSIBILITY_MODE=block

# Behavioral enforcement
SPEED_CORRECTNESS_MODE=block
WISHY_WASHY_MODE=block
ASSUMPTIONS_MODE=block
IGNORE_PATTERNS_MODE=block
INCOMPLETE_ANALYSIS_MODE=block
SCOPE_CREEP_MODE=block
NOT_VERIFYING_MODE=block
IGNORING_ERRORS_MODE=block
INCOMPLETE_REQUEST_MODE=block
NOT_CHECKING_EXISTING_MODE=block
APOLOGY_VALIDATION_MODE=block
UNEXPLAINED_CHANGES_MODE=block

# New categories (v7)
SECURITY_MODE=block
RESOURCE_CLEANUP_MODE=block
BREAKING_CHANGES_MODE=block
DEPENDENCY_ADDITIONS_MODE=block

# Memory enforcement
MEMORY_MODE=block
