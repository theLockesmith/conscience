# Quality Enforcer Whitelist
# Patterns in this file will NOT trigger blocks even if they match enforcement patterns.
# Use this for known false positives.
#
# Format: One regex pattern per line
# Lines starting with # are comments
# Empty lines are ignored
#
# Example entries:
# documentation says.*should work    # Quoting documentation
# the error message says.*probably   # Quoting error messages
# the log shows.*might              # Quoting log output

# Technical documentation references
the documentation says
according to the docs
the spec says
per the specification
the rfc states

# Quoting user requests
you asked me to
as you requested
you said you want

# Discussing existing code behavior (not proposing)
# Note: patterns must be specific to avoid catching violations
the current implementation does
the existing code does
the existing code handles
currently the system does

# Test file contexts (test assertions often use these words)
expect.*to.*fail
assert.*should
test.*expects
